<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租稅小問答 - 專業版</title>
<style>
/* =========================
   長輩模式（70+ 超大字）
   ========================= */
.elder-mode{
  font-size: 48px;
  line-height: 1.4;
}
.elder-mode h1{ font-size: 56px; }
.elder-mode h2{ font-size: 52px; }
.elder-mode p, .elder-mode span, .elder-mode li{ font-size: 44px; }
.elder-mode .options{ grid-template-columns: 1fr; gap: 20px; }
.elder-mode .opt{ font-size: 48px; padding: 40px 30px; }
.elder-mode #ageBtns button, .elder-mode #genderBtns button{ font-size: 48px; padding: 36px 48px; margin: 12px; }
.elder-mode button{ font-size: 44px; padding: 26px 36px; margin: 8px 0; }
.elder-mode .progress-container{ height: 28px; }
.elder-mode #quizScreen p:last-of-type{ display: none; }

/* ---------- 全局樣式 ---------- */
body{
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f7fb;
  margin: 0;
  font-size: 20px;
  color: #333;
}

.app{
  max-width: 900px;
  margin: 40px auto;
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
  position: relative;
}

@media (min-width: 1024px){ .app{ max-width: 1200px; padding: 40px; } }
@media (max-width: 480px){ .app{ margin: 10px; padding: 15px; } }

.hidden{ display: none !important; }

/* 選項與按鈕 */
.options{ display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
.opt{
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  text-align: center;
  font-size: 20px;
  background: #fff;
  transition: all 0.2s;
}
@media (hover: hover) { .opt:hover { background: #eef2ff; border-color: #4f6ef7; } }

button{
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 18px;
  transition: opacity 0.2s, transform 0.1s;
}
button:active { transform: scale(0.98); }
.primary{ background: #4f6ef7; color: #fff; }
.secondary{ background: #eee; color: #333; }
.danger { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }

/* 進度條 */
.progress-container{ background: #eee; border-radius: 8px; overflow: hidden; margin: 10px 0; height: 16px; }
.progress-bar{ height: 100%; width: 100%; transition: width 0.1s linear; background: linear-gradient(to right, #4f6ef7, #78a1ff); }

/* 長按動畫提示 */
.holding {
  position: relative;
  overflow: hidden;
}
.holding::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  height: 4px;
  background: #dc2626;
  width: 0%;
  transition: width 2s linear;
}
.is-holding::after { width: 100%; }

/* 彈窗樣式 */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.modal {
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}
.modal input {
  width: 80%;
  padding: 12px;
  font-size: 24px;
  text-align: center;
  letter-spacing: 5px;
  margin: 15px 0;
  border: 2px solid #ddd;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="app">
  <button id="elderBtn" class="secondary" onclick="toggleElderMode()" style="float:right">👴 長輩模式</button>
  <h1>租稅小問答</h1>
  <p>每人 3 題｜每題 15 秒</p>

  <!-- 開始畫面 -->
  <div id="startScreen">
    <p>請選擇年齡：</p>
    <div id="ageBtns">
      <button onclick="setAge('10-19', this)">10-19</button>
      <button onclick="setAge('20-29', this)">20-29</button>
      <button onclick="setAge('30-39', this)">30-39</button>
      <button onclick="setAge('40-49', this)">40-49</button>
      <button onclick="setAge('50-59', this)">50-59</button>
      <button onclick="setAge('60-69', this)">60-69</button>
      <button onclick="setAge('70-79', this)">70-79</button>
      <button onclick="setAge('80+', this)">80+</button>
    </div>
    <p>請選擇性別：</p>
    <div id="genderBtns">
      <button onclick="setGender('男生', this)">男生</button>
      <button onclick="setGender('女生', this)">女生</button>
    </div>
    <br>
    <button class="primary" style="width:100%; padding:20px;" onclick="startGame()">開始作答</button>
  </div>

  <!-- 作答畫面 -->
  <div id="quizScreen" class="hidden">
    <div>第 <span id="qIndex"></span> / 3 題｜剩餘 <span id="time">15</span> 秒</div>
    <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
    <h2 id="question"></h2>
    <div class="options" id="options"></div>
  </div>

  <!-- 結果畫面 -->
  <div id="resultScreen" class="hidden">
    <h2>作答結果</h2>
    <p>正確率：<b style="font-size:1.5em; color:#4f6ef7;"><span id="rate"></span>%</b></p>
    <div id="reviewSection" class="review">
      <h3>答錯題目回顧：</h3>
      <ul id="reviewBody"></ul>
    </div>
    <hr>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <button class="primary" onclick="nextPlayer()">下一位作答</button>
      <button class="secondary" onclick="handleExport()">匯出資料 (CSV)</button>
      <!-- 長按按鈕 -->
      <button id="clearBtn" class="danger holding" 
              onmousedown="startHold()" onmouseup="cancelHold()" 
              onmouseleave="cancelHold()" ontouchstart="startHold()" 
              ontouchend="cancelHold()">
        ⚠️ 長按 2 秒清空所有資料
      </button>
    </div>
  </div>
</div>

<!-- 密碼彈窗 -->
<div id="pwdModal" class="modal-overlay hidden">
  <div class="modal">
    <h3 id="pwdTitle">管理員驗證</h3>
    <p id="pwdDesc">請輸入管理密碼以執行此操作</p>
    <input type="password" id="pwdInput" maxlength="6" placeholder="******" inputmode="numeric">
    <div style="display:flex; gap:10px;">
      <button class="secondary" style="flex:1" onclick="closeModal()">取消</button>
      <button class="primary" style="flex:1" onclick="submitPassword()">確認</button>
    </div>
  </div>
</div>

<script>
// ---------- 初始化與資料持久化 ----------
let allRecords = JSON.parse(localStorage.getItem('tax_records') || '[]');
const ADMIN_PASSWORD = "231600"; // 直接固定密碼

// ---------- 狀態變數 ----------
const QUESTION_BANK = [
    {q:"房屋稅納稅義務基準日是哪一日？",options:["2月末日","3月22日","9月22日"],correct:0},
    {q:"房屋使用情形變更需在哪一天前提出申請？",options:["3月22日","7月22日","9月22日"],correct:0},
    {q:"全國單一自住房屋，稅率是多少？",options:["1%","1.2%","1.5%"],correct:0},
    {q:"住家用房屋現值10萬元以下免稅，適用對象？",options:["法人","自然人","以上皆可以適用"],correct:1},
    {q:"住家用房屋現值10萬元以下免稅，全國最多幾戶？",options:["1戶","3戶","5戶"],correct:1},
    {q:"房屋稅2.0新制，對於自住房屋適用條件增訂規定？",options:["不可出租或供營業使用","本人、配偶或直系親屬實際居住","應辦竣戶籍登記"],correct:2},
    {q:"房屋稅2.0新制，自住房屋增訂戶籍登記之對象？",options:["本人","配偶","直系親屬","以上皆是"],correct:3},
    {q:"當年房屋要適用自住稅率，需在何時前辦竣戶籍？",options:["3月22日","9月22日"],correct:0},
    {q:"房屋稅由按月計徵，變成按什麼計徵？",options:["按年","按日"],correct:0},
    {q:"自住房屋稅率1.2％的成立要件？",options:["無出租/營業","實際居住並辦竣戶籍","全國合計3戶內","以上皆是"],correct:3},
    {q:"使用牌照稅幾月要繳納?",options:["4月","5月"],correct:0},
    {q:"地價稅幾月要繳納?",options:["9月","11月"],correct:1},
    {q:"地價稅自用住宅優惠稅率是多少?",options:["千分之二","千分之十"],correct:0},
    {q:"地價稅優惠稅率幾月幾日前提出申請,當年度適用?",options:["3月22日","9月22日"],correct:1}
];

let selected=[], idx=0, timer, timeLeft=15, answers=[], playerInfo={age:'', gender:''};
let ageSelected=null, genderSelected=null;
let holdTimer;

// ---------- 核心功能 ----------
function saveToLocal() {
    localStorage.setItem('tax_records', JSON.stringify(allRecords));
}

function toggleElderMode(){
  document.body.classList.toggle('elder-mode');
  document.getElementById('elderBtn').textContent = document.body.classList.contains('elder-mode') ? '👦 一般模式' : '👴 長輩模式';
}

function setAge(age, btn){ ageSelected=age; highlightButton('ageBtns', btn); }
function setGender(gender, btn){ genderSelected=gender; highlightButton('genderBtns', btn); }

function highlightButton(containerId, selectedBtn){
  const container=document.getElementById(containerId);
  Array.from(container.children).forEach(btn=>{btn.className='';});
  if(selectedBtn) selectedBtn.className='primary';
}

function startGame(){
  if(!ageSelected || !genderSelected){ showMsg('請先選擇年齡與性別'); return; }
  playerInfo={age:ageSelected, gender:genderSelected};
  selected=QUESTION_BANK.sort(()=>Math.random()-0.5).slice(0,3);
  idx=0; answers=[];
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');
  showQ();
}

function showQ(){
  const q=selected[idx];
  document.getElementById('qIndex').textContent=idx+1;
  document.getElementById('question').textContent=q.q;
  const box=document.getElementById('options'); box.innerHTML='';
  q.options.forEach((o,i)=>{
    const d=document.createElement('div');
    d.className='opt';
    d.textContent=(i+1)+'. '+o;
    d.onclick=()=>checkAnswer(i);
    box.appendChild(d);
  });
  startTimer();
}

function startTimer(){
  clearInterval(timer);
  timeLeft=15;
  const bar=document.getElementById('progressBar');
  timer=setInterval(()=>{
    timeLeft-=0.1;
    if(timeLeft<=0){ clearInterval(timer); checkAnswer(null); return;}
    document.getElementById('time').textContent=Math.ceil(timeLeft);
    bar.style.width=(timeLeft/15*100)+'%';
  },100);
}

function checkAnswer(choice){
  clearInterval(timer);
  const q=selected[idx];
  const options=document.getElementById('options').children;
  Array.from(options).forEach(opt=>opt.style.pointerEvents='none');

  if(choice !== null){
      if(choice === q.correct) options[choice].style.background='#4CAF50';
      else {
          options[choice].style.background='#f33';
          options[q.correct].style.background='#4CAF50';
      }
  } else {
      options[q.correct].style.background='#ffc107';
  }

  setTimeout(()=>{
      const now = new Date();
      answers.push({
          time: now.toLocaleString(),
          age: playerInfo.age,
          gender: playerInfo.gender,
          q: q.q,
          chosen: choice===null ? '未作答' : q.options[choice],
          correct: q.options[q.correct],
          isRight: choice === q.correct
      });
      idx++;
      if(idx<3) showQ(); else finishGame();
  }, 1000);
}

function finishGame(){
  const rightCount = answers.filter(a=>a.isRight).length;
  const rate = Math.round(rightCount/3*100);
  
  // 寫入總紀錄
  answers.forEach(a => a.rate = rate);
  allRecords.push(...answers);
  saveToLocal();

  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');
  document.getElementById('rate').textContent=rate;

  const review=document.getElementById('reviewBody');
  review.innerHTML='';
  const wrongs = answers.filter(a=>!a.isRight);
  if(wrongs.length === 0) review.innerHTML='<li>🎉 完美！全部答對。</li>';
  else wrongs.forEach(w=>review.innerHTML+=`<li><b>${w.q}</b><br>正確答案：${w.correct}</li>`);
}

function nextPlayer(){
  ageSelected=null; genderSelected=null;
  highlightButton('ageBtns', null); highlightButton('genderBtns', null);
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

// ---------- 密碼與清空功能 ----------
let currentAction = null;

function startHold(){
    const btn = document.getElementById('clearBtn');
    btn.classList.add('is-holding');
    holdTimer = setTimeout(() => {
        btn.classList.remove('is-holding');
        triggerPassword('clear');
    }, 2000);
}

function cancelHold(){
    clearTimeout(holdTimer);
    document.getElementById('clearBtn').classList.remove('is-holding');
}

function triggerPassword(action){
    currentAction = action;
    const modal = document.getElementById('pwdModal');
    modal.classList.remove('hidden');
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
}

function submitPassword(){
    const val = document.getElementById('pwdInput').value;
    if(val === ADMIN_PASSWORD){
        if(currentAction === 'clear') {
            if(confirm('確定要徹底刪除所有本地歷史紀錄嗎？')){
                allRecords = [];
                saveToLocal();
                showMsg('資料已成功清空');
                nextPlayer();
            }
        } else if(currentAction === 'export') {
            exportCSV();
        }
        closeModal();
    } else {
        showMsg('密碼錯誤，請重新輸入');
        document.getElementById('pwdInput').value = '';
    }
}

function closeModal(){ document.getElementById('pwdModal').classList.add('hidden'); }

function handleExport(){
    if(allRecords.length === 0){ showMsg('目前沒有任何作答紀錄可供匯出'); return; }
    triggerPassword('export');
}

function exportCSV(){
    const rows = [['時間','年齡','性別','題目','作答','正確答案','是否正確','該次正確率']];
    allRecords.forEach(r => rows.push([r.time, r.age, r.gender, r.q, r.chosen, r.correct, r.isRight?'是':'否', r.rate]));
    
    let csvContent = "\uFEFF" + rows.map(e => e.map(c => `"${c}"`).join(",")).join("\n");
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `租稅挑戰紀錄_${new Date().toLocaleDateString()}.csv`;
    link.click();
}

function showMsg(m){ alert(m); }
</script>

</body>
</html>
