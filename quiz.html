<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租稅小問答 - 專業行動版</title>
    <style>
        :root {
            --primary: #4f6ef7;
            --primary-dark: #3b54c4;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        /* 長輩模式 */
        .elder-mode { font-size: 28px; }
        .elder-mode .app { max-width: 100%; margin: 0; border-radius: 0; min-height: 100vh; }
        .elder-mode h1 { font-size: 40px; }
        .elder-mode h2 { font-size: 36px; }
        .elder-mode p, .elder-mode span, .elder-mode li { font-size: 32px; }
        .elder-mode .options { grid-template-columns: 1fr; gap: 20px; }
        .elder-mode .opt { font-size: 34px; padding: 30px 20px; border-width: 3px; }
        .elder-mode button { font-size: 34px; padding: 25px; }
        .elder-mode #ageBtns button, .elder-mode #genderBtns button { padding: 25px; margin: 10px; flex: 1 1 40%; }
        .elder-mode .progress-container { height: 30px; }

        body {
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg);
            margin: 0;
            color: var(--text);
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            max-width: 800px;
            margin: 20px auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        @media (max-width: 600px) {
            .app { margin: 0; border-radius: 0; padding: 20px; }
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .hidden { display: none !important; }

        h1 { color: var(--primary); margin: 0; font-size: 28px; }
        h2 { font-size: 22px; margin-top: 0; }

        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        
        button {
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            font-size: 16px;
        }

        button:active { transform: scale(0.96); }
        .primary { background: var(--primary); color: white; }
        .secondary { background: #e2e8f0; color: var(--secondary); }
        .danger { background: #fee2e2; color: var(--danger); }
        .outline { background: transparent; border: 2px solid #e2e8f0; color: var(--secondary); }
        .active-choice { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        @media (max-width: 500px) { .options { grid-template-columns: 1fr; } }
        
        .opt {
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            background: white;
            transition: all 0.2s;
        }

        .progress-container { background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 15px 0; height: 12px; }
        .progress-bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); }

        .review-item { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--danger); list-style: none; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal input { width: 100%; padding: 15px; font-size: 24px; text-align: center; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }

        .holding { position: relative; overflow: hidden; }
        .holding::after { content: ''; position: absolute; bottom: 0; left: 0; height: 6px; background: var(--danger); width: 0%; }
        .is-holding::after { width: 100%; transition: width 2s linear; }

        .admin-stat-card { background: #f1f5f9; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-val { font-size: 24px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>租稅小問答</h1>
        <button id="elderBtn" class="outline" onclick="toggleElderMode()">👴 長輩模式</button>
    </div>

    <!-- 開始畫面 -->
    <div id="startScreen">
        <p>💡 每人隨機 3 題，每題限時 15 秒</p>
        
        <p><b>1. 請選擇您的年齡層：</b></p>
        <div id="ageBtns" class="btn-group">
            <button class="outline" onclick="setAge('10-19', this)">10-19</button>
            <button class="outline" onclick="setAge('20-29', this)">20-29</button>
            <button class="outline" onclick="setAge('30-39', this)">30-39</button>
            <button class="outline" onclick="setAge('40-49', this)">40-49</button>
            <button class="outline" onclick="setAge('50-59', this)">50-59</button>
            <button class="outline" onclick="setAge('60-69', this)">60-69</button>
            <button class="outline" onclick="setAge('70-79', this)">70-79</button>
            <button class="outline" onclick="setAge('80+', this)">80+</button>
        </div>
        <p><b>2. 請選擇您的性別：</b></p>
        <div id="genderBtns" class="btn-group">
            <button class="outline" onclick="setGender('男生', this)">男生</button>
            <button class="outline" onclick="setGender('女生', this)">女生</button>
        </div>
        <div style="margin-top: 30px;">
            <button class="primary" style="width:100%; height: 70px; font-size: 20px;" onclick="startGame()">開始作答</button>
        </div>
        
        <div style="margin-top: 50px; text-align: center;">
            <button class="outline" style="font-size: 12px; padding: 8px 15px; color: #cbd5e1; border-color: #f1f5f9;" onclick="openAdmin()">⚙️ 管理員數據</button>
        </div>
    </div>

    <!-- 作答畫面 -->
    <div id="quizScreen" class="hidden">
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>第 <span id="qIndex">1</span> / 3 題</span>
            <span style="color:var(--danger)">⏱ 剩餘 <span id="time">15</span> 秒</span>
        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <h2 id="question" style="margin: 20px 0;">題目載入中...</h2>
        <div class="options" id="options"></div>
    </div>

    <!-- 結果畫面 -->
    <div id="resultScreen" class="hidden">
        <div style="text-align:center; margin-bottom:30px;">
            <div style="font-size: 60px;">🎯</div>
            <h2 style="margin-bottom: 5px;">作答完成！</h2>
            <p>您的正確率為 <b style="font-size: 2em; color: var(--primary);"><span id="rate">0</span>%</b></p>
        </div>
        
        <div id="reviewSection">
            <h3 style="border-left: 4px solid var(--primary); padding-left: 10px;">重點回顧</h3>
            <div id="reviewBody"></div>
        </div>

        <div style="display:flex; flex-direction:column; gap:12px; margin-top:30px;">
            <button class="primary" style="height:60px;" onclick="nextPlayer()">下一位作答</button>
        </div>
    </div>
</div>

<!-- 管理員密碼彈窗 -->
<div id="pwdModal" class="modal-overlay hidden">
    <div class="modal">
        <h3 id="pwdTitle">管理員驗證</h3>
        <div id="adminDataSection" class="hidden">
            <div class="admin-stat-card">
                <div>
                    <div class="stat-val" id="statPlayerCount">0</div>
                    <div style="font-size:12px">累積人數</div>
                </div>
                <div>
                    <div class="stat-val" id="statRecordCount">0</div>
                    <div style="font-size:12px">數據總量</div>
                </div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 15px;">
                <button class="primary" onclick="performExport()">📥 匯出 CSV</button>
                <button id="clearBtn" class="danger holding" 
                        onmousedown="startHold()" onmouseup="cancelHold()" 
                        onmouseleave="cancelHold()" ontouchstart="startHold()" 
                        ontouchend="cancelHold()">🗑 清空紀錄</button>
            </div>
        </div>
        <div id="pwdInputArea">
            <input type="password" id="pwdInput" maxlength="6" placeholder="••••••">
        </div>
        <div style="display:flex; gap:12px;">
            <button class="secondary" style="flex:1" onclick="closeModal()">關閉</button>
            <button id="pwdSubmitBtn" class="primary" style="flex:1" onclick="submitPassword()">驗證</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {q:"房屋稅納稅義務基準日是哪一日？",options:["2月末日","3月22日","9月22日"],correct:0},
    {q:"房屋使用情形變更需在哪一天前提出申請？",options:["3月22日","7月22日","9月22日"],correct:0},
    {q:"全國單一自住房屋，稅率是多少？",options:["1%","1.2%","1.5%"],correct:0},
    {q:"住家用房屋現值10萬元以下免稅，適用對象？",options:["法人","自然人","以上皆可以適用"],correct:1},
    {q:"住家用房屋現值10萬元以下免稅，全國最多幾戶？",options:["1戶","3戶","5戶"],correct:1},
    {q:"房屋稅2.0新制，自住房屋適用條件增訂規定？",options:["不可出租或供營業使用","本人、配偶 or 直系親屬實際居住","應辦竣戶籍登記"],correct:2},
    {q:"房屋稅2.0新制，自用增訂戶籍登記對象？",options:["本人","配偶","直系親屬","以上皆是"],correct:3},
    {q:"要適用自住稅率，需在何時前辦竣戶籍？",options:["3月22日","9月22日"],correct:0},
    {q:"房屋稅由按月計徵，改為何種計徵方式？",options:["按年","按日"],correct:0},
    {q:"自住房屋稅率1.2％的成立要件？",options:["無出租營業","辦竣戶籍","全國合計3戶內","以上皆是"],correct:3},
    {q:"使用牌照稅於幾月份開徵？",options:["4月","5月","11月"],correct:0},
    {q:"地價稅於幾月份開徵？",options:["4月","5月","11月"],correct:2},
    {q:"地價稅自用住宅優惠稅率是多少？",options:["千分之二","千分之十","千分之十五"],correct:0},
    {q:"地價稅優惠稅率應於何日前提出申請？",options:["3月22日","9月22日","11月30日"],correct:1},
    {q:"小明有5輛車，可以申請合併到一張稅單嗎?",options:["不可以","可以"],correct:1},
    {q:"全國單一自住房屋稅率1%的成立要件為何？",options:["房屋無出租或供營業情形","供本人、配偶或直系親屬實際居住使用，且應於該屋辦竣戶籍登記","本人、配偶及未成年子女於全國僅持有1戶房屋","房屋現值在一定金額以下","以上皆是"],correct:4},
    {q:"法人持有住家用房屋現值10萬元以下是否適用免稅規定？",options:["是","否"],correct:1},
    {q:"房屋使用情形變更，經核定後，未再變更，是否需再申報？",options:["是","否"],correct:1},
    {q:"非自住房屋戶數計算是縣市歸戶還是全國歸戶？",options:["縣市歸戶","全國歸戶"],correct:1},
    {q:"非自住房屋是以個人還是家戶來計算持有戶數？",options:["個人","家戶"],correct:0}
];

let allRecords = JSON.parse(localStorage.getItem('tax_v3_records') || '[]');
const ADMIN_PWD = "231600";
let currentQuiz = [], currentIdx = 0, timer, timeLeft = 15;
let playerAnswers = [], playerProfile = {age:'', gender:''};
let holdTimer;

function toggleElderMode() {
    document.body.classList.toggle('elder-mode');
    document.getElementById('elderBtn').innerHTML = document.body.classList.contains('elder-mode') ? '👦 一般模式' : '👴 長輩模式';
}

function setAge(val, btn) {
    playerProfile.age = val;
    updateBtnStyle('ageBtns', btn);
}

function setGender(val, btn) {
    playerProfile.gender = val;
    updateBtnStyle('genderBtns', btn);
}

function updateBtnStyle(id, activeBtn) {
    document.getElementById(id).querySelectorAll('button').forEach(b => b.classList.remove('active-choice'));
    activeBtn.classList.add('active-choice');
}

function startGame() {
    if(!playerProfile.age || !playerProfile.gender) {
        alert("請先選擇您的年齡與性別！");
        return;
    }
    // 隨機抽3題
    currentQuiz = [...questions].sort(() => Math.random() - 0.5).slice(0, 3);
    currentIdx = 0;
    playerAnswers = [];
    
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    const q = currentQuiz[currentIdx];
    document.getElementById('qIndex').textContent = currentIdx + 1;
    document.getElementById('question').textContent = q.q;
    
    const optionsBox = document.getElementById('options');
    optionsBox.innerHTML = '';
    q.options.forEach((optStr, i) => {
        const div = document.createElement('div');
        div.className = 'opt';
        div.textContent = optStr;
        div.onclick = () => selectOption(i);
        optionsBox.appendChild(div);
    });
    
    startTimer();
}

function startTimer() {
    clearInterval(timer);
    timeLeft = 15;
    const bar = document.getElementById('progressBar');
    const timeText = document.getElementById('time');
    
    timer = setInterval(() => {
        timeLeft -= 0.1;
        if(timeLeft <= 0) {
            clearInterval(timer);
            selectOption(null);
            return;
        }
        timeText.textContent = Math.ceil(timeLeft);
        bar.style.width = (timeLeft / 15 * 100) + '%';
    }, 100);
}

function selectOption(choiceIdx) {
    clearInterval(timer);
    const q = currentQuiz[currentIdx];
    const opts = document.querySelectorAll('.opt');
    opts.forEach(o => o.style.pointerEvents = 'none');

    if(choiceIdx !== null) {
        if(choiceIdx === q.correct) {
            opts[choiceIdx].style.borderColor = 'var(--success)';
            opts[choiceIdx].style.background = '#dcfce7';
        } else {
            opts[choiceIdx].style.borderColor = 'var(--danger)';
            opts[choiceIdx].style.background = '#fee2e2';
            opts[q.correct].style.borderColor = 'var(--success)';
        }
    } else {
        opts[q.correct].style.borderColor = 'var(--primary)';
    }

    playerAnswers.push({
        q: q.q,
        chosen: choiceIdx === null ? "未作答" : q.options[choiceIdx],
        correct: q.options[q.correct],
        isRight: choiceIdx === q.correct
    });

    setTimeout(() => {
        currentIdx++;
        if(currentIdx < 3) renderQuestion();
        else showResults();
    }, 1000);
}

function showResults() {
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultScreen').classList.remove('hidden');
    
    const correctCount = playerAnswers.filter(a => a.isRight).length;
    const scoreRate = Math.round((correctCount / 3) * 100);
    document.getElementById('rate').textContent = scoreRate;

    const uniqueID = new Set(allRecords.map(r => r.playerID)).size + 1;
    const timestamp = new Date().toLocaleString();

    playerAnswers.forEach(ans => {
        allRecords.push({
            playerID: uniqueID,
            time: timestamp,
            age: playerProfile.age,
            gender: playerProfile.gender,
            ...ans,
            finalScore: scoreRate
        });
    });
    localStorage.setItem('tax_v3_records', JSON.stringify(allRecords));

    const rb = document.getElementById('reviewBody');
    rb.innerHTML = '';
    playerAnswers.forEach(ans => {
        const div = document.createElement('div');
        div.className = 'review-item';
        if(ans.isRight) div.style.borderColor = 'var(--success)';
        div.innerHTML = `<b>${ans.q}</b><br><small>您的答案：${ans.chosen} | 正確答案：${ans.correct}</small>`;
        rb.appendChild(div);
    });
}

function nextPlayer() {
    playerProfile = {age:'', gender:''};
    document.querySelectorAll('.active-choice').forEach(b => b.classList.remove('active-choice'));
    document.getElementById('resultScreen').classList.add('hidden');
    document.getElementById('startScreen').classList.remove('hidden');
}

function openAdmin() {
    document.getElementById('pwdModal').classList.remove('hidden');
    document.getElementById('adminDataSection').classList.add('hidden');
    document.getElementById('pwdInputArea').classList.remove('hidden');
    document.getElementById('pwdInput').value = '';
}

function closeModal() { document.getElementById('pwdModal').classList.add('hidden'); }

function submitPassword() {
    if(document.getElementById('pwdInput').value === ADMIN_PWD) {
        document.getElementById('pwdInputArea').classList.add('hidden');
        document.getElementById('adminDataSection').classList.remove('hidden');
        document.getElementById('statPlayerCount').textContent = new Set(allRecords.map(r => r.playerID)).size;
        document.getElementById('statRecordCount').textContent = allRecords.length;
    } else { alert("密碼錯誤"); }
}

function performExport() {
    if(allRecords.length === 0) return alert("無資料");
    let csv = "\uFEFF玩家序號,時間,年齡,性別,題目,答案,正確,得分\n";
    allRecords.forEach(r => {
        csv += `${r.playerID},${r.time},${r.age},${r.gender},"${r.q}","${r.chosen}","${r.correct}",${r.finalScore}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'tax_records.csv';
    a.click();
}

function startHold() {
    const btn = document.getElementById('clearBtn');
    btn.classList.add('is-holding');
    holdTimer = setTimeout(() => {
        if(confirm("確定清空？")) {
            allRecords = [];
            localStorage.clear();
            location.reload();
        }
    }, 2000);
}
function cancelHold() { 
    clearTimeout(holdTimer); 
    document.getElementById('clearBtn').classList.remove('is-holding'); 
}
</script>
</body>
</html>
