<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>租稅與史前文物時空冒險 - 管理優化版</title>

<!-- 匯出 Excel 必備函式庫 -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

<style>
/* ===================== 基本樣式與變數 ===================== */
:root { 
    --vh: 1vh; 
    --primary: #0284c7; 
    --secondary: #f1f5f9;
    --accent: #10b981;
    --danger: #ef4444;
    --text-main: #1e293b;
}

body { 
    margin: 0; 
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
    overflow: hidden; 
    background: #0f172a; 
    user-select: none;
    color: var(--text-main); 
}

/* ===================== 主舞台 ===================== */
#stage { 
    width: 100vw; 
    height: calc(var(--vh) * 100); 
    position: relative; 
    overflow: hidden; 
    transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.bg-tax { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); }
.bg-museum { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }

/* ===================== 頂部狀態列 ===================== */
.stat { 
    position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.9); padding: 12px 25px; border-radius: 50px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-weight: bold; z-index: 50;
    display: flex; gap: 15px; align-items: center; backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.8);
    min-width: 240px; justify-content: space-between;
}
.progress-container { 
    flex-grow: 1; height: 10px; background: #e2e8f0; border-radius: 6px; overflow: hidden; 
}
.progress-bar { 
    height: 100%; background: var(--primary); width: 0%; transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
}

/* ===================== 文物樣式 ===================== */
.artifact { 
    position: absolute; cursor: pointer;
    display: flex; justify-content: center; align-items: center;
    width: 90px; height: 90px;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
    z-index: 20;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.artifact:active { transform: scale(0.9); }
.artifact img { width: 100px; height: 100px; object-fit: contain; pointer-events: none; }
/* 圖片失效時的備案 */
.artifact-fallback { font-size: 50px; }

/* ===================== 特效 ===================== */
.float-text {
    position: absolute; font-weight: 900; font-size: 28px;
    pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100;
    text-shadow: 2px 2px 0px white;
}
@keyframes floatUp {
    0% { transform: translate(-50%, 0); opacity: 1; }
    100% { transform: translate(-50%, -80px); opacity: 0; }
}

@keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(5px, -5px); }
    50% { transform: translate(-5px, 5px); }
    75% { transform: translate(5px, 5px); }
}
.shake-effect { animation: shake 0.2s ease-in-out; }

/* ===================== 彈窗樣式 ===================== */
.modal { 
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
    display: flex; justify-content: center; align-items: center; z-index: 200;
    backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.4s;
}
.modal.active { opacity: 1; pointer-events: auto; }

.card { 
    background: white; padding: 40px; border-radius: 32px;
    width: 85%; max-width: 480px; text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
    transform: translateY(40px); transition: transform 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    display: flex; flex-direction: column;
}
.modal.active .card { transform: translateY(0); }

h1 { color: var(--primary); margin-top: 0; }

button { 
    padding: 16px; margin: 10px 0; width: 100%; font-size: 18px; 
    border-radius: 18px; border: 0; cursor: pointer; font-weight: bold;
    transition: all 0.2s; position: relative;
}
button:active { transform: translateY(2px); filter: brightness(0.9); }

.btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 0 #0369a1; }
.btn-accent { background: var(--accent); color: white; box-shadow: 0 4px 0 #059669; }
.btn-secondary { background: var(--secondary); color: #475569; }
.btn-danger { background: var(--danger); color: white; box-shadow: 0 4px 0 #b91c1c; }

#hint { background: #fffbeb; border: 2px dashed #fde68a; padding: 15px; margin-top: 15px; text-align: left; border-radius: 15px; font-size: 14px; color: #92400e; line-height: 1.5; }
input[type="password"] { width: 100%; padding: 18px; margin: 15px 0; border: 2px solid #e2e8f0; border-radius: 18px; font-size: 20px; text-align: center; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
input[type="password"]:focus { border-color: var(--primary); }

@media (max-height: 600px) {
    .card { padding: 20px; max-width: 90%; }
    h1 { font-size: 24px; margin: 5px; }
}
</style>
</head>
<body onload="init()">

<div class="stat">
    <span>⏱ <span id="timer">--</span>s</span>
    <div class="progress-container"><div id="pBar" class="progress-bar"></div></div>
    <span id="info">準備中...</span>
</div>

<div id="stage" class="bg-tax"></div>

<!-- 開始畫面 -->
<div id="start" class="modal active">
    <div class="card">
        <h1>🏹 租稅時空獵人</h1>
        <p>通過考驗以開啟時空之門，收集史前文物！</p>
        <button class="btn-primary" onclick="startGame()">⚡ 開始挑戰</button>
        <div style="display: flex; gap: 10px; margin-top: 10px; width: 100%;">
            <button class="btn-secondary" style="font-size: 14px" onclick="triggerImport()">📥 匯入歷史數據</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
</div>

<!-- 題目畫面 -->
<div id="quiz" class="modal">
    <div class="card">
        <h3 id="q" style="font-size: 22px; color: var(--primary); margin-bottom: 20px; min-height: 60px;"></h3>
        <div id="opts" style="width: 100%;"></div>
        <button id="hintBtn" class="btn-secondary" style="display:none; margin-top: 10px;" onclick="showHint()">💡 解析查看</button>
        <div id="hint" style="display:none"></div>
    </div>
</div>

<!-- 管理員驗證 -->
<div id="auth" class="modal">
    <div class="card">
        <h3>🔒 管理員授權</h3>
        <p>請輸入密碼以進行機密操作</p>
        <input type="password" id="adminPwd" placeholder="管理員密碼">
        <button class="btn-primary" id="authConfirmBtn">確認執行</button>
        <button class="btn-secondary" onclick="closeAuth()">取消返回</button>
    </div>
</div>

<!-- 結算畫面 -->
<div id="win" class="modal">
    <div class="card">
        <h2 style="color: var(--primary); margin-bottom: 10px;">🎉 任務完成！</h2>
        <div style="background: #f8fafc; padding: 20px; border-radius: 20px; margin: 15px 0;">
            <p id="finalStat" style="font-size: 18px; line-height: 2.2; margin: 0;"></p>
        </div>
        <button class="btn-accent" onclick="openAuth('export')">📊 匯出學習紀錄報表</button>
        <button class="btn-danger" id="resetBtn">🗑️ 長按清空紀錄</button>
        <button class="btn-secondary" onclick="location.reload()">再試一次</button>
    </div>
</div>

<script>
// ==========================================================
// ⚙️ 遊戲核心設定
// ==========================================================
const CONFIG = { 
    exportPassword: "231600",      
    taxGoal: 3,                      
    museumGoal: 5,                   
    timeLimit: 40,                   
    artifactMoveInterval: 2500,      
    artifactSpeedStep: 200,          
    artifactMinInterval: 700,        
    artifactImages: ["phooto1.png", "phooto2.png", "phooto3.png", "phooto4.png"],
    fallbackIcons: ["🏺", "🗿", "🦴", "🏹", "🐚"]
};

const QUESTIONS = [
    {q:"房屋稅在哪個月份繳納？", a:"5月", o:["5月","4月","11月"], e:"房屋稅每年5月開徵；地價稅則是11月。"},
    {q:"單一自住房屋(非豪宅)全國單一稅率為？", a:"1%", o:["1%","1.2%","2%"], e:"113年起，全國單一自住房屋（排除豪宅）稅率由1.2%降為1%。"},
    {q:"申請自住房屋稅率需具備什麼條件？", a:"辦竣戶籍登記", o:["辦竣戶籍登記","持有5年","本人入住"], e:"113年起新制：房屋必須有本人、配偶或直系親屬「辦竣戶籍登記」才符合自住。"},
    {q:"土地增值稅在什麼時候需要繳納？", a:"土地所有權移轉時", o:["每年5月","每年11月","土地所有權移轉時"], e:"當土地買賣、贈與或進行所有權移轉時，需繳納土地增值稅。"},
    {q:"牌照稅逾期繳納，每逾幾日加徵1%滯納金？", a:"3日", o:["1日","3日","7日"], e:"每逾3日加徵1%滯納金，最高加徵至10%。"},
    {q:"使用牌照稅於每年何時開徵？", a:"4月", o:["4月","5月","11月"], e:"一般自用車輛及機車的使用牌照稅於每年4月開徵。"},
    {q:"印花稅的憑證不包括下列何者？", a:"一般收據", o:["銀錢收據","合約書","一般收據"], e:"印花稅課徵範圍包含銀錢收據、買賣動產契據、承攬契據與典賣、讓受及分割不動產契據。"}
];

// ==========================================================
// 🕹️ 遊戲邏輯與狀態
// ==========================================================

const setVH = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
window.addEventListener('resize', setVH);
setVH();

let state = { 
    active: false, 
    time: CONFIG.timeLimit, 
    stage: 1, 
    tax: 0, 
    museum: 0, 
    startTime: null, 
    playerID: crypto.randomUUID().substring(0,8), 
    details: [], 
    shuffledQuestions: [], 
    currentQuestionIndex: 0 
};

const DB_NAME = "TAX_ADVENTURE_RECORDS_V1";

const getHistory = () => JSON.parse(localStorage.getItem(DB_NAME) || "[]");
const saveToHistory = (record) => {
    const history = getHistory();
    history.push(record);
    localStorage.setItem(DB_NAME, JSON.stringify(history));
};

function init() {
    updateUI();
    setupResetButton();
}

function startGame() {
    document.getElementById("start").classList.remove("active");
    // 洗牌題目
    state.shuffledQuestions = [...QUESTIONS].sort(() => Math.random() - 0.5);
    state.active = true; 
    state.startTime = Date.now();
    startTimer(); 
    showQuiz();
    updateUI();
}

function startTimer() { 
    const timerEl = document.getElementById("timer");
    const t = setInterval(() => { 
        if (!state.active) { clearInterval(t); return; } 
        state.time--; 
        timerEl.innerText = state.time; 
        if (state.time <= 0) { 
            state.active = false; 
            triggerShake();
            setTimeout(() => { 
                alert("⏳ 時間到！挑戰未能及時完成。"); 
                location.reload(); 
            }, 500);
        } 
    }, 1000); 
}

function showQuiz() {
    const q = state.shuffledQuestions[state.currentQuestionIndex];
    state.current = q;
    let hasAttemptedThisQ = false;

    const modal = document.getElementById("quiz");
    modal.classList.add("active");
    document.getElementById("hint").style.display = "none";
    document.getElementById("hintBtn").style.display = "none";
    document.getElementById("q").innerText = q.q;
    
    const box = document.getElementById("opts"); 
    box.innerHTML = "";
    
    [...q.o].sort(() => Math.random() - 0.5).forEach(opt => {
        const b = document.createElement("button");
        b.className = "btn-secondary"; 
        b.innerText = opt;
        b.onclick = () => {
            const isCorrect = opt === q.a;
            
            // 紀錄細節
            if (!hasAttemptedThisQ || isCorrect) {
                state.details.push({ 
                    question: q.q, 
                    userChoice: opt, 
                    isCorrect, 
                    timestamp: new Date().toLocaleTimeString() 
                });
                hasAttemptedThisQ = true;
            }
            
            if (isCorrect) { 
                b.className = "btn-accent";
                state.tax++; 
                createFloatText(b, "✔️ 正確", "#10b981");
                state.currentQuestionIndex++;
                
                setTimeout(() => {
                    if (state.tax >= CONFIG.taxGoal) { 
                        modal.classList.remove("active"); 
                        enterMuseum(); 
                    } else {
                        // 如果題目不夠，重新抽題
                        if (state.currentQuestionIndex >= state.shuffledQuestions.length) {
                            state.shuffledQuestions = [...QUESTIONS].sort(() => Math.random() - 0.5);
                            state.currentQuestionIndex = 0;
                        }
                        showQuiz(); 
                    }
                    updateUI();
                }, 600);
            } else { 
                b.className = "btn-danger";
                triggerShake();
                createFloatText(b, "❌ 錯誤", "#ef4444");
                document.getElementById("hintBtn").style.display = "block";
            }
        };
        box.appendChild(b);
    });
}

function showHint() { 
    const hintEl = document.getElementById("hint");
    hintEl.style.display = "block"; 
    hintEl.innerHTML = `📘 <b>解析：</b>${state.current.e}`;
}

function enterMuseum() { 
    state.stage = 2; 
    document.getElementById("stage").className = "bg-museum"; 
    updateUI(); 
    spawnArtifact(); 
}

function triggerShake() {
    const s = document.getElementById("stage");
    s.classList.add("shake-effect");
    setTimeout(() => s.classList.remove("shake-effect"), 200);
}

function spawnArtifact() {
    if (!state.active) return;
    const stage = document.getElementById("stage"); 
    const el = document.createElement("div"); 
    el.className = "artifact";
    
    // 優先加載圖片，失敗則使用 Emoji
    const img = new Image();
    img.src = CONFIG.artifactImages[Math.floor(Math.random() * CONFIG.artifactImages.length)];
    img.onload = () => el.appendChild(img);
    img.onerror = () => {
        const span = document.createElement("span");
        span.className = "artifact-fallback";
        span.innerText = CONFIG.fallbackIcons[Math.floor(Math.random() * CONFIG.fallbackIcons.length)];
        el.appendChild(span);
    };

    const size = 90;
    const setPos = (node) => {
        const x = Math.random() * (window.innerWidth - size);
        const y = 80 + Math.random() * (window.innerHeight - size - 100);
        node.style.left = x + "px"; 
        node.style.top = y + "px";
    };
    setPos(el);
    
    el.onclick = (e) => {
        state.museum++; 
        createFloatText(null, "💎 +1", "#0284c7", e.clientX, e.clientY);
        el.remove();
        if (state.museum >= CONFIG.museumGoal) {
            endGame(); 
        } else {
            spawnArtifact();
        }
        updateUI();
    };
    stage.appendChild(el); 
    
    const move = () => {
        if (!state.active || !el.parentNode) return;
        setPos(el);
        
        // 速度隨著收集數量增加
        const currentInterval = Math.max(
            CONFIG.artifactMinInterval, 
            CONFIG.artifactMoveInterval - (state.museum * CONFIG.artifactSpeedStep)
        );
        
        el.style.transition = `all ${currentInterval/1000}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
        setTimeout(move, currentInterval);
    }; 
    setTimeout(move, 100);
}

function createFloatText(anchor, text, color, x, y) {
    const ft = document.createElement("div");
    ft.className = "float-text"; ft.innerText = text; ft.style.color = color;
    if (anchor) {
        const r = anchor.getBoundingClientRect();
        ft.style.left = (r.left + r.width/2) + "px"; ft.style.top = r.top + "px";
    } else {
        ft.style.left = x + "px"; ft.style.top = y + "px";
    }
    document.body.appendChild(ft);
    setTimeout(() => ft.remove(), 800);
}

function updateUI() {
    const info = document.getElementById("info");
    const pBar = document.getElementById("pBar");
    if (state.stage === 1) {
        info.innerText = `稅務考驗：${state.tax}/${CONFIG.taxGoal}`;
        pBar.style.width = (state.tax / CONFIG.taxGoal) * 100 + "%";
    } else {
        info.innerText = `文物收集：${state.museum}/${CONFIG.museumGoal}`;
        pBar.style.width = (state.museum / CONFIG.museumGoal) * 100 + "%";
    }
}

function endGame() {
    state.active = false;
    const duration = Math.floor((Date.now() - state.startTime) / 1000);
    const correctCount = state.tax;
    
    saveToHistory({ 
        playerID: state.playerID, 
        date: new Date().toLocaleString(), 
        duration, 
        correctCount, 
        artifacts: state.museum,
        details: state.details 
    });
    
    document.getElementById("finalStat").innerHTML = `
        🕒 <b>通關時間：</b> ${duration} 秒<br>
        🏺 <b>收集文物：</b> ${state.museum} 件<br>
        🎓 <b>答對題數：</b> ${correctCount} 題
    `;
    document.getElementById("win").classList.add("active");
}

// ==========================================================
// 🛡️ 管理與匯出功能
// ==========================================================

function openAuth(mode) { 
    document.getElementById("auth").classList.add("active");
    const pwdInput = document.getElementById("adminPwd");
    pwdInput.value = "";
    pwdInput.focus();
    
    document.getElementById("authConfirmBtn").onclick = () => {
        if (pwdInput.value === CONFIG.exportPassword) {
            if (mode === 'export') exportExcel();
            else if (mode === 'clear') { 
                localStorage.removeItem(DB_NAME); 
                alert("🗑️ 歷史數據已清空");
                location.reload(); 
            }
            closeAuth();
        } else {
            alert("❌ 密碼錯誤");
            pwdInput.value = "";
        }
    };
}

function closeAuth() { 
    document.getElementById("auth").classList.remove("active"); 
}

function exportExcel() {
    const history = getHistory();
    if (!history.length) return alert("目前尚無通關紀錄資料");
    
    const exportData = history.map(h => ({ 
        "玩家ID": h.playerID, 
        "日期": h.date, 
        "通關用時(秒)": h.duration, 
        "答對題數": h.correctCount, 
        "文物數量": h.artifacts 
    }));
    
    const ws = XLSX.utils.json_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "學習紀錄");
    
    // 下載
    const fileName = `TaxAdventure_Report_${new Date().toISOString().split('T')[0]}.xlsx`;
    XLSX.writeFile(wb, fileName);
}

function triggerImport() { 
    document.getElementById("importFile").click(); 
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const data = JSON.parse(ev.target.result);
            if (Array.isArray(data)) { 
                localStorage.setItem(DB_NAME, JSON.stringify(data)); 
                alert("✅ 資料匯入完成"); 
            }
        } catch(err) { 
            alert("❌ 格式不正確"); 
        }
    };
    reader.readAsText(file);
}

function setupResetButton() {
    const btn = document.getElementById("resetBtn");
    let pressTimer;
    
    const startPress = (e) => {
        e.preventDefault();
        btn.style.filter = "brightness(0.7)";
        pressTimer = setTimeout(() => {
            openAuth('clear');
        }, 1500);
    };
    
    const cancelPress = () => {
        btn.style.filter = "none";
        clearTimeout(pressTimer);
    };
    
    btn.addEventListener('mousedown', startPress);
    btn.addEventListener('mouseup', cancelPress);
    btn.addEventListener('touchstart', startPress);
    btn.addEventListener('touchend', cancelPress);
}
</script>
</body>
</html>
